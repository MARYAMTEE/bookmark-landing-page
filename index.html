<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark landing page</title>
    <link rel="shortcut icon" href="./images/favicon-32x32.png" type="image/x-icon">
    <!-- stylesheet -->
    <link rel="stylesheet" href="./css/output.css">
    <!-- javaScript -->
     <script src="./js/script.js" defer></script>
    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-50 pt-10 font-display">
    <header>
        <div class="relative px-8 md:flex md:justify-between md:items-center">
            <div class="flex justify-between md:inline-block">
                <img src="./images/logo-bookmark.svg" alt="Logo image" />
                <button type="button" aria-label="Hamburger Icon" class="open__menu md:hidden">
                    <img src="./images/icon-hamburger.svg" alt="" aria-hidden="true">
                </button>
            </div>
    
            <nav class="nav__menu bg-blue-950 h-dvh w-full px-8 pt-10 fixed top-0 -right-full z-50 md:relative md:right-0 md:pt-0 md:px-0 md:h-auto md:w-auto md:bg-transparent" aria-label="Primary">
                <div class="flex justify-between mb-10 md:hidden">
                    <img src="./images/logo-bookmark-2.svg" alt="Logo image for mobile nav">
    
                    <button type="button" aria-label="Close icon">
                        <img src="./images/icon-close.svg" class="close__nav" alt="" aria-hidden="true">
                    </button>
                </div>
    
                <ul class="nav__list text-center md:flex md:items-center md:gap-10">
                    <li class="nav__item"><a href="#" class="nav__link">Features</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">Pricing</a></li>
                    <li class="nav__item border-b md:border-t-0"><a href="#" class="nav__link">Contact</a></li>
                    <button type="button"  class="text-gray-50 border-2 border-gray-50 mt-6 w-full py-2 rounded-sm uppercase tracking-widest hover:bg-transparent hover:text-red-400 hover:py-1.5 transition duration-300 motion-reduce:transition-none hover:border-2 hover:border-red-400 md:mt-0 md:bg-red-400 md:w-auto md:px-8 md:shadow-xl md:border-0 md:hover:px-7.5">Login</button>
                </ul>

                <ul class="flex gap-8 justify-center md:hidden absolute bottom-10 left-1/2 -translate-1/2">
                    <li><img src="./images/icon-facebook.svg" alt="facebook icon"></li>
                    <li><img src="./images/icon-twitter.svg" alt="twitter icon"></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="py-16 text-center md:text-left md:flex md:gap-6 lg:gap-16 justify-between md:flex-row-reverse">
            <div class="relative px-2 md:flex-1 overflow-hidden">
                <div class="absolute top-[20%] right-[-60%] w-[140%] h-[70%] bg-blue-600 rounded-l-full -z-10"></div>

                <div class="mb-10 relative z-10">
                    <img src="./images/illustration-hero.svg" class="w-full mx-auto" alt="Hero image of television" loading="lazy" decoding="async">
                </div>
            </div>
    
            <div class="px-8 mt-5 md:flex-1">
                <h1 class="text-3xl font-medium text-gray-800 mb-4 relative z-10 leading-11">A Simple Bookmark Manager</h1>
                <p class="text-gray-500 leading-relaxed mb-8 relative z-10">A clean and simple interface to organize your favourite websites. Open a new 
                browser tab and see your sites load instantly. Try it for free.</p>
    
                <div class="flex gap-4 items-center relative z-10">
                    <a href="#" class="bg-blue-600 text-white px-3 py-3.5 rounded-md shadow-md hover:bg-blue-700 transition">Get it on Chrome</a>
                    <a href="#" class="bg-gray-100 text-gray-700 px-3 py-3.5 rounded-md shadow-md hover:bg-gray-200 transition">Get it on Firefox</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
